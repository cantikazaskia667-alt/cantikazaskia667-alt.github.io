<!doctype html>
<html lang="id" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Petualangan Akhlak Mulia</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <script src="/_sdk/element_sdk.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&amp;family=Poppins:wght@600;700;800&amp;display=swap" rel="stylesheet">
  <style>
html, body { height: 100%; margin: 0; }
* { box-sizing: border-box; }

body {
  font-family: 'Fredoka', sans-serif;
  /* Updated wallpaper colors: Soft Blue to White */
  background: linear-gradient(135deg, #e0f2fe 0%, #f8fafc 40%, #bae6fd 100%);
  min-height: 100%;
  overflow-x: hidden;
}

.bg-pattern {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0; pointer-events: none; z-index: 0;
  background-image:
    radial-gradient(circle at 20% 80%, rgba(56,189,248,0.1) 0%, transparent 50%),
    radial-gradient(circle at 80% 20%, rgba(186,230,253,0.15) 0%, transparent 50%),
    radial-gradient(circle at 50% 50%, rgba(255,255,255,0.05) 0%, transparent 50%);
}

.screen { animation: fadeIn 0.5s ease; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

.title-main {
  font-family: 'Poppins', sans-serif;
  /* Soft Blue Gradient */
  background: linear-gradient(135deg, #0284c7, #0369a1, #0c4a6e);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  font-size: 2.5rem;
  font-weight: 800;
  text-shadow: 0 4px 12px rgba(2,132,199,0.1);
}

.subtitle {
  color: #0369a1;
  font-size: 1.1rem;
  font-weight: 600;
}

.card-container {
  background: rgba(255,255,255,0.95);
  border-radius: 24px;
  padding: 2rem;
  box-shadow: 0 20px 60px rgba(15,23,42,0.1);
  backdrop-filter: blur(10px);
  border: 1px solid rgba(255,255,255,0.6);
}

.question-container {
  background: linear-gradient(135deg, rgba(255,255,255,0.97), rgba(240,249,255,0.95));
  border-radius: 24px;
  padding: 2rem;
  box-shadow: 0 20px 60px rgba(15,23,42,0.1);
  border: 2px solid rgba(56,189,248,0.15);
}

.input-field {
  width: 100%;
  padding: 14px 18px;
  border: 2px solid #bae6fd;
  border-radius: 14px;
  font-family: 'Fredoka', sans-serif;
  font-size: 1rem;
  color: #0c4a6e;
  background: rgba(224,242,254,0.3);
  transition: all 0.3s ease;
  margin-top: 0.5rem;
}
.input-field:focus {
  outline: none;
  border-color: #38bdf8;
  background: rgba(224,242,254,0.5);
  box-shadow: 0 0 12px rgba(56,189,248,0.3);
}
.input-field::placeholder { color: #94a3b8; }

.btn {
  padding: 14px 32px;
  border: none;
  border-radius: 14px;
  font-family: 'Poppins', sans-serif;
  font-weight: 700;
  font-size: 1rem;
  cursor: pointer;
  transition: all 0.3s ease;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.btn-start {
  background: linear-gradient(135deg, #0284c7, #0369a1);
  color: white;
  box-shadow: 0 8px 24px rgba(2,132,199,0.3);
}
.btn-start:hover { transform: translateY(-4px); box-shadow: 0 12px 32px rgba(2,132,199,0.4); }
.btn-start:active { transform: translateY(-2px); }

.btn-level {
  background: #f1f5f9;
  color: #0369a1;
  border: 2px solid #e2e8f0;
  font-weight: 700;
  transition: all 0.2s ease;
}
.btn-level:hover {
  background: #e0f2fe;
  border-color: #38bdf8;
  color: #0284c7;
  transform: translateY(-2px);
}
.btn-level.selected {
  background: #0284c7;
  color: white;
  border-color: #0369a1;
  box-shadow: 0 4px 12px rgba(2,132,199,0.2);
}

.btn-answer {
  width: 100%;
  padding: 16px 20px;
  background: white;
  color: #0c4a6e;
  border: 2px solid #e0f2fe;
  text-align: left;
  font-size: 1.1rem;
  font-weight: 600;
  margin: 10px 0;
  border-radius: 14px;
  transition: all 0.2s ease;
  position: relative;
  overflow: hidden;
}
.btn-answer:hover:not(:disabled) {
  background: #f0f9ff;
  border-color: #38bdf8;
  transform: translateX(4px);
  box-shadow: 0 6px 16px rgba(56,189,248,0.1);
}
.btn-answer:active:not(:disabled) { transform: translateX(2px); }
.btn-answer:disabled { cursor: not-allowed; opacity: 0.7; }

.btn-answer.correct {
  background: #d1fae5;
  border-color: #10b981;
  color: #047857;
  font-weight: 700;
}

.btn-answer.wrong {
  background: #fee2e2;
  border-color: #ef4444;
  color: #7f1d1d;
  font-weight: 700;
}

.score-display {
  background: linear-gradient(135deg, #38bdf8, #0284c7);
  color: white;
  padding: 12px 20px;
  border-radius: 14px;
  font-weight: 800;
  font-size: 1.2rem;
  text-align: center;
  box-shadow: 0 6px 16px rgba(2,132,199,0.2);
}

.progress-bar {
  height: 12px;
  background: rgba(224,242,254,1);
  border-radius: 10px;
  overflow: hidden;
  margin: 1rem 0;
}

.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, #38bdf8, #0284c7);
  transition: width 0.5s ease;
}

.question-number {
  color: #0369a1;
  font-weight: 800;
  font-size: 0.9rem;
  text-transform: uppercase;
  letter-spacing: 1px;
}

.question-text {
  color: #0c4a6e;
  font-size: 1.3rem;
  font-weight: 700;
  margin: 1.5rem 0;
  line-height: 1.6;
}

.result-emoji {
  font-size: 5rem;
  animation: bounce 0.6s ease-in-out;
}
@keyframes bounce {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-20px); }
}

.result-text {
  color: #0c4a6e;
  font-size: 1.8rem;
  font-weight: 800;
  margin: 1rem 0;
}

.result-message {
  color: #0284c7;
  font-size: 1.1rem;
  margin: 0.5rem 0 1.5rem 0;
  font-weight: 600;
}

.feedback-correct {
  background: linear-gradient(135deg, #d1fae5, #a7f3d0);
  color: #047857;
  padding: 16px 20px;
  border-radius: 14px;
  font-weight: 700;
  margin: 1rem 0;
  font-size: 1.1rem;
}

.feedback-wrong {
  background: linear-gradient(135deg, #fee2e2, #fecaca);
  color: #7f1d1d;
  padding: 16px 20px;
  border-radius: 14px;
  font-weight: 700;
  margin: 1rem 0;
  font-size: 1.1rem;
}
  </style>
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
 </head>
 <body class="h-full overflow-auto">
  <div class="bg-pattern"></div>
  <div id="app" class="relative z-10 h-full flex flex-col">
   
   <div id="welcome-screen" class="screen flex-1 flex items-center justify-center p-4">
    <div class="card-container text-center max-w-md w-full">
     <div style="font-size: 4rem; margin-bottom: 0.5rem;">🕌</div>
     <h1 id="game-title" class="title-main mb-1">Petualangan Akhlak Mulia</h1>
     <p id="game-subtitle" class="subtitle mb-6">Belajar Akhlak Dengan Menyenangkan</p>
     
     <div class="mb-5 space-y-4 text-left">
      <div>
       <label class="text-sm font-bold text-sky-800 block mb-1">📝 Siapa Nama Kamu?</label>
       <input id="player-input" type="text" class="input-field" placeholder="Masukkan nama kamu" maxlength="30">
      </div>
      
      <div>
       <label class="text-sm font-bold text-sky-800 block mb-2">🎮 Pilih Level Petualangan:</label>
       <div class="grid grid-cols-3 gap-2">
        <button onclick="selectLevel(1)" id="lvl-1" class="btn btn-level py-3 rounded-lg selected">Lv. 1</button>
        <button onclick="selectLevel(2)" id="lvl-2" class="btn btn-level py-3 rounded-lg">Lv. 2</button>
        <button onclick="selectLevel(3)" id="lvl-3" class="btn btn-level py-3 rounded-lg">Lv. 3</button>
       </div>
      </div>
     </div>
     
     <button onclick="startGame()" class="btn btn-start w-full mb-3">Mulai Petualangan 🚀</button>
     <p class="text-xs text-sky-700">Jawab 5 soal akhlak dan kumpulkan poin! ⭐</p>
    </div>
   </div>

   <div id="question-screen" class="screen hidden flex-1 flex items-center justify-center p-4">
    <div class="question-container max-w-lg w-full">
     <div class="mb-4">
      <div class="flex justify-between items-center mb-2">
       <div>
        <span id="level-indicator" class="text-xs font-bold text-white bg-sky-600 px-2 py-1 rounded-full mr-2">LEVEL 1</span>
        <span id="q-counter" class="question-number">Soal 1 dari 5</span>
       </div>
       <div class="score-display" id="score-display">⭐ 0</div>
      </div>
      <div class="progress-bar">
       <div id="progress-fill" class="progress-fill" style="width: 20%;"></div>
      </div>
     </div>
     <div class="mb-6">
      <p id="question-text" class="question-text"></p>
     </div>
     <div id="answers-container" class="space-y-3"></div>
     <div id="feedback" class="hidden mt-4"></div>
    </div>
   </div>

   <div id="result-screen" class="screen hidden flex-1 flex items-center justify-center p-4">
    <div class="card-container text-center max-w-md w-full">
     <div id="result-emoji" class="result-emoji">✅</div>
     <p id="result-message" class="result-message"></p>
     <p id="result-text" class="result-text"></p>
     <div id="next-button-container" class="mt-6">
      <button onclick="nextQuestion()" class="btn btn-start w-full">Soal Berikutnya →</button>
     </div>
    </div>
   </div>

   <div id="final-screen" class="screen hidden flex-1 flex items-center justify-center p-4">
    <div class="card-container text-center max-w-md w-full">
     <div style="font-size: 5rem; margin-bottom: 1rem; animation: bounce 0.6s ease-in-out;">🏆</div>
     <h2 class="text-2xl font-bold text-sky-800 mb-2">Alhamdulillah!</h2>
     <p id="final-player-name" class="text-lg text-sky-700 mb-2">Selamat, Teman!</p>
     <div class="score-display mb-4" id="final-score" style="display:inline-block;">⭐ 0</div>
     <div id="final-summary" class="text-sm text-sky-700 mb-6 space-y-2">
      <p>✅ Soal Benar: <span id="correct-count">0</span>/5</p>
      <p>📚 Semoga terus belajar akhlak mulia</p>
     </div>
     <button onclick="resetGame()" class="btn btn-start w-full">Mainkan Lagi 🎮</button>
    </div>
   </div>
  </div>

  <script>
// ============ DATABASE SOAL PER LEVEL ============
const databaseSoal = {
 1: [
  { q: 'Apa makna dari "Akhlak Mulia"?', options: ['A. Perilaku yang baik dan terpuji', 'B. Pakaian yang indah', 'C. Harta yang banyak', 'D. Kedudukan yang tinggi'], correct: 0 },
  { q: 'Sikap jujur adalah contoh dari akhlak mulia yang berarti...', options: ['A. Selalu bercerita panjang', 'B. Berkata sesuai kenyataan tanpa tipu', 'C. Berbicara dengan keras', 'D. Mengatakan apa saja yang diinginkan'], correct: 1 },
  { q: 'Hormat kepada orang tua adalah akhlak mulia karena...', options: ['A. Orang tua adalah yang merawat kita sejak kecil', 'B. Orang tua memberikan uang saku', 'C. Orang tua membeli mainan', 'D. Semua jawaban salah'], correct: 0 },
  { q: 'Tolong menolong kepada teman yang kesusahan termasuk akhlak...', options: ['A. Solidaritas sosial', 'B. Belas kasih', 'C. Empati dan kepedulian', 'D. Semua benar'], correct: 3 },
  { q: 'Sabar menghadapi kesulitan adalah akhlak mulia karena...', options: ['A. Membuat orang menertawakan kita', 'B. Menunjukkan kekuatan hati dan iman', 'C. Membuat hari lebih panjang', 'D. Tidak ada gunanya'], correct: 1 }
 ],
 2: [
  { q: 'Jika ada teman yang mengejek kita, sikap pemaaf yang benar adalah...', options: ['A. Membalas dengan ejekan yang lebih parah', 'B. Tidak membalas dan mendoakan kebaikan untuknya', 'C. Mengajak teman lain untuk memusuhinya', 'D. Menangis seharian'], correct: 1 },
  { q: 'Menjaga kebersihan lingkungan sekolah merupakan bukti dari...', options: ['A. Rasa takut dihukum guru', 'B. Menjalankan bagian dari iman', 'C. Ingin dipuji teman-teman', 'D. Tugas penjaga sekolah saja'], correct: 1 },
  { q: 'Mengucapkan "Permisi" saat lewat di depan orang yang lebih tua adalah contoh...', options: ['A. Sopan santun', 'B. Membuang waktu', 'C. Pamer kebaikan', 'D. Rasa takut'], correct: 0 },
  { q: 'Ketika berjanji kepada teman untuk belajar bersama, sebaiknya kita...', options: ['A. Datang kalau sempat saja', 'B. Menepati janji tersebut dengan tepat waktu', 'C. Berpura-pura lupa', 'D. Membatalkannya tanpa alasan'], correct: 1 },
  { q: 'Membantu ibu mencuci piring di rumah hukumnya...', options: ['A. Hanya untuk anak perempuan', 'B. Mengurangi waktu bermain', 'C. Bernilai pahala dan bentuk bakti', 'D. Tidak perlu dilakukan'], correct: 2 }
 ],
 3: [
  { q: 'Bagaimana cara terbaik menerapkan sikap rendah hati (tawadhu)?', options: ['A. Suka memamerkan nilai bagus kita', 'B. Menghargai orang lain tanpa merasa diri lebih hebat', 'C. Selalu mengalah meskipun kita benar', 'D. Tidak mau berteman dengan siapa-siapa'], correct: 1 },
  { q: 'Contoh dari sikap amanah dalam kehidupan sehari-hari adalah...', options: ['A. Menyampaikan pesan titipan orang tua dengan benar', 'B. Meminjam pensil teman tapi tidak mengembalikannya', 'C. Mencontek saat ujian', 'D. Menguping pembicaraan orang lain'], correct: 0 },
  { q: 'Mengapa kita harus menjauhi sifat hasad (iri dengki)?', options: ['A. Karena hasad dapat menghapus kebaikan kita', 'B. Karena hasad membuat kita jadi populer', 'C. Hasad tidak ada pengaruhnya', 'D. Hasad diperbolehkan setiap hari'], correct: 0 },
  { q: 'Sikap istiqomah dalam belajar artinya...', options: ['A. Belajar hanya kalau mau ujian saja', 'B. Belajar terus-menerus secara rutin dan konsisten', 'C. Belajar sambil bermain game online', 'D. Malas belajar jika tidak diawasi'], correct: 1 },
  { q: 'Menghargai perbedaan pendapat saat berdiskusi kelompok merupakan contoh...', options: ['A. Sikap keras kepala', 'B. Sikap toleransi (Tasamuh)', 'C. Sikap acuh tak acuh', 'D. Sikap tidak punya pendirian'], correct: 1 }
 ]
};

// ============ GAME STATE ============
let playerName = '';
let currentLevel = 1;
let currentQuestionIdx = 0;
let score = 0;
let correctAnswers = 0;
let answered = false;
let questions = [];

function selectLevel(lvl) {
 currentLevel = lvl;
 // Update visual button
 document.querySelectorAll('.btn-level').forEach(btn => btn.classList.remove('selected'));
 document.getElementById(`lvl-${lvl}`).classList.add('selected');
}

function startGame() {
 const input = document.getElementById('player-input');
 playerName = input.value.trim() || 'Teman Baik';
 
 questions = databaseSoal[currentLevel];
 currentQuestionIdx = 0;
 score = 0;
 correctAnswers = 0;
 answered = false;

 document.getElementById('welcome-screen').classList.add('hidden');
 document.getElementById('question-screen').classList.remove('hidden');
 
 document.getElementById('level-indicator').textContent = `LEVEL ${currentLevel}`;
 
 showQuestion();
}

function showQuestion() {
 answered = false;
 
 const q = questions[currentQuestionIdx];
 const progress = ((currentQuestionIdx + 1) / questions.length) * 100;
 
 document.getElementById('q-counter').textContent = `Soal ${currentQuestionIdx + 1} dari ${questions.length}`;
 document.getElementById('progress-fill').style.width = progress + '%';
 document.getElementById('score-display').textContent = `⭐ ${score}`;
 document.getElementById('question-text').textContent = q.q;
 document.getElementById('feedback').classList.add('hidden');

 const answersContainer = document.getElementById('answers-container');
 answersContainer.innerHTML = '';

 q.options.forEach((option, idx) => {
  const btn = document.createElement('button');
  btn.className = 'btn-answer';
  btn.textContent = option;
  btn.onclick = () => selectAnswer(idx);
  answersContainer.appendChild(btn);
 });
}

function selectAnswer(selectedIdx) {
 if (answered) return;
 answered = true;

 const q = questions[currentQuestionIdx];
 const isCorrect = selectedIdx === q.correct;
 
 const buttons = document.querySelectorAll('.btn-answer');
 buttons.forEach((btn, idx) => {
  btn.disabled = true;
  if (idx === q.correct) {
   btn.classList.add('correct');
  } else if (idx === selectedIdx && !isCorrect) {
   btn.classList.add('wrong');
  }
 });

 const feedback = document.getElementById('feedback');
 feedback.classList.remove('hidden');

 if (isCorrect) {
  score += 20;
  correctAnswers++;
  feedback.className = 'feedback-correct';
  feedback.innerHTML = '✅ Jawaban Benar! +20 Poin';
 } else {
  feedback.className = 'feedback-wrong';
  feedback.innerHTML = '❌ Maaf, jawaban kurang tepat. Tetap semangat ya!';
 }

 setTimeout(() => {
  showResultScreen(isCorrect);
 }, 1200);
}

function showResultScreen(correct) {
 document.getElementById('question-screen').classList.add('hidden');
 document.getElementById('result-screen').classList.remove('hidden');

 const message = correct ? 'MasyaAllah! Bagus banget!' : 'Tidak apa-apa, ayo coba lagi!';

 document.getElementById('result-emoji').textContent = correct ? '✅' : '❌';
 document.getElementById('result-message').textContent = message;
 document.getElementById('result-text').textContent = `Poin: ${score}`;
}

function nextQuestion() {
 currentQuestionIdx++;

 if (currentQuestionIdx >= questions.length) {
  showFinalScreen();
 } else {
  document.getElementById('result-screen').classList.add('hidden');
  document.getElementById('question-screen').classList.remove('hidden');
  showQuestion();
 }
}

function showFinalScreen() {
 document.getElementById('result-screen').classList.add('hidden');
 document.getElementById('final-screen').classList.remove('hidden');

 document.getElementById('final-player-name').textContent = `Selamat, ${playerName}!`;
 document.getElementById('final-score').textContent = `⭐ ${score}`;
 document.getElementById('correct-count').textContent = correctAnswers;
}

function resetGame() {
 document.getElementById('final-screen').classList.add('hidden');
 document.getElementById('welcome-screen').classList.remove('hidden');
 document.getElementById('player-input').value = '';
 selectLevel(1); // Reset to Level 1
}

lucide.createIcons();
  </script>
 </body>
</html>
