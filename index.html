<!doctype html>
<html lang="id" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Petualangan Akhlak Mulia</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <script src="/_sdk/element_sdk.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&amp;family=Poppins:wght@600;700;800&amp;display=swap" rel="stylesheet">
  <style>
html, body { height: 100%; margin: 0; }
* { box-sizing: border-box; }

body {
  font-family: 'Fredoka', sans-serif;
  /* Updated wallpaper colors: Cream to Brown */
  background: linear-gradient(135deg, #fffbeb 0%, #fef3c7 40%, #a16207 100%);
  min-height: 100%;
  overflow-x: hidden;
}

.bg-pattern {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0; pointer-events: none; z-index: 0;
  background-image:
    radial-gradient(circle at 20% 80%, rgba(161,98,7,0.08) 0%, transparent 50%),
    radial-gradient(circle at 80% 20%, rgba(251,191,36,0.08) 0%, transparent 50%),
    radial-gradient(circle at 50% 50%, rgba(255,255,255,0.03) 0%, transparent 50%);
}

.screen { animation: fadeIn 0.5s ease; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

.title-main {
  font-family: 'Poppins', sans-serif;
  /* Color gradient still green, maybe a warmer accent fits too? Let's try golden for accent. */
  background: linear-gradient(135deg, #fbbf24, #f59e0b, #b45309);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  font-size: 2.5rem;
  font-weight: 800;
  text-shadow: 0 4px 12px rgba(245,158,11,0.2);
}

.subtitle {
  color: #a16207;
  font-size: 1.1rem;
  font-weight: 600;
}

.card-container {
  background: rgba(255,255,255,0.95);
  border-radius: 24px;
  padding: 2rem;
  box-shadow: 0 20px 60px rgba(0,0,0,0.2);
  backdrop-filter: blur(10px);
  border: 1px solid rgba(255,255,255,0.2);
}

.question-container {
  background: linear-gradient(135deg, rgba(255,255,255,0.97), rgba(255,251,235,0.95));
  border-radius: 24px;
  padding: 2rem;
  box-shadow: 0 20px 60px rgba(0,0,0,0.2);
  border: 2px solid rgba(161,98,7,0.1);
}

.input-field {
  width: 100%;
  padding: 14px 18px;
  border: 2px solid #fde68a;
  border-radius: 14px;
  font-family: 'Fredoka', sans-serif;
  font-size: 1rem;
  color: #713f12;
  background: rgba(253,230,138,0.1);
  transition: all 0.3s ease;
  margin-top: 0.5rem;
}
.input-field:focus {
  outline: none;
  border-color: #f59e0b;
  background: rgba(253,230,138,0.2);
  box-shadow: 0 0 12px rgba(245,158,11,0.3);
}
.input-field::placeholder { color: #facc15; }

.btn {
  padding: 14px 32px;
  border: none;
  border-radius: 14px;
  font-family: 'Poppins', sans-serif;
  font-weight: 700;
  font-size: 1rem;
  cursor: pointer;
  transition: all 0.3s ease;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.btn-start {
  background: linear-gradient(135deg, #f59e0b, #b45309);
  color: white;
  box-shadow: 0 8px 24px rgba(245,158,11,0.4);
}
.btn-start:hover { transform: translateY(-4px); box-shadow: 0 12px 32px rgba(245,158,11,0.5); }
.btn-start:active { transform: translateY(-2px); }

.btn-answer {
  width: 100%;
  padding: 16px 20px;
  background: white;
  color: #713f12;
  border: 3px solid #fef3c7;
  text-align: left;
  font-size: 1.1rem;
  font-weight: 600;
  margin: 10px 0;
  border-radius: 14px;
  transition: all 0.2s ease;
  position: relative;
  overflow: hidden;
}
.btn-answer:hover:not(:disabled) {
  background: #fef3c7;
  border-color: #f59e0b;
  transform: translateX(4px);
  box-shadow: 0 6px 16px rgba(245,158,11,0.2);
}
.btn-answer:active:not(:disabled) { transform: translateX(2px); }
.btn-answer:disabled { cursor: not-allowed; opacity: 0.7; }

.btn-answer.correct {
  background: #d1fae5;
  border-color: #10b981;
  color: #047857;
  font-weight: 700;
}

.btn-answer.wrong {
  background: #fee2e2;
  border-color: #ef4444;
  color: #7f1d1d;
  font-weight: 700;
}

.score-display {
  background: linear-gradient(135deg, #fbbf24, #f59e0b);
  color: #1e293b;
  padding: 16px 24px;
  border-radius: 14px;
  font-weight: 800;
  font-size: 1.3rem;
  text-align: center;
  box-shadow: 0 6px 16px rgba(245,158,11,0.3);
}

.progress-bar {
  height: 12px;
  background: rgba(161,98,7,0.2);
  border-radius: 10px;
  overflow: hidden;
  margin: 1rem 0;
}

.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, #f59e0b, #fbbf24);
  transition: width 0.5s ease;
  box-shadow: 0 0 12px rgba(245,158,11,0.6);
}

.question-number {
  color: #a16207;
  font-weight: 800;
  font-size: 0.9rem;
  text-transform: uppercase;
  letter-spacing: 1px;
}

.question-text {
  color: #713f12;
  font-size: 1.4rem;
  font-weight: 700;
  margin: 1.5rem 0;
  line-height: 1.6;
}

.result-screen {
  text-align: center;
}

.result-emoji {
  font-size: 5rem;
  animation: bounce 0.6s ease-in-out;
}
@keyframes bounce {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-20px); }
}

.result-text {
  color: #713f12;
  font-size: 1.8rem;
  font-weight: 800;
  margin: 1rem 0;
}

.result-message {
  color: #f59e0b;
  font-size: 1.1rem;
  margin: 0.5rem 0 1.5rem 0;
  font-weight: 600;
}

.feedback-correct {
  background: linear-gradient(135deg, #d1fae5, #a7f3d0);
  color: #047857;
  padding: 16px 20px;
  border-radius: 14px;
  font-weight: 700;
  margin: 1rem 0;
  font-size: 1.1rem;
}

.feedback-wrong {
  background: linear-gradient(135deg, #fee2e2, #fecaca);
  color: #7f1d1d;
  padding: 16px 20px;
  border-radius: 14px;
  font-weight: 700;
  margin: 1rem 0;
  font-size: 1.1rem;
}

.emoji-icon {
  display: inline-block;
  margin: 0 6px;
  font-size: 1.3em;
  animation: bounce-light 0.4s ease-in-out infinite;
}
@keyframes bounce-light {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-8px); }
}
  </style>
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
  <style>body { box-sizing: border-box; }</style>
 </head>
 <body class="h-full overflow-auto">
  <div class="bg-pattern"></div>
  <div id="app" class="relative z-10 h-full flex flex-col"><div id="welcome-screen" class="screen flex-1 flex items-center justify-center p-4">
    <div class="card-container text-center max-w-md w-full">
     <div style="font-size: 4rem; margin-bottom: 1rem;">
      🕌
     </div>
     <h1 id="game-title" class="title-main mb-2">Petualangan Akhlak Mulia</h1>
     <p id="game-subtitle" class="subtitle mb-6">Belajar Akhlak Dengan Menyenangkan</p>
     <div class="mb-6 space-y-4">
      <div><label class="text-sm font-bold text-yellow-800 block mb-2">📝 Siapa Nama Kamu?</label> <input id="player-input" type="text" class="input-field" placeholder="Masukkan nama kamu" maxlength="30">
      </div>
     </div><button onclick="startGame()" class="btn btn-start w-full mb-3">Mulai Petualangan 🚀</button>
     <p class="text-xs text-yellow-700">Jawab 5 soal akhlak dan kumpulkan poin! ⭐</p>
    </div>
   </div><div id="question-screen" class="screen hidden flex-1 flex items-center justify-center p-4">
    <div class="question-container max-w-lg w-full"><div class="mb-4">
      <div class="flex justify-between items-center mb-2"><span id="q-counter" class="question-number">Soal 1 dari 5</span>
       <div class="score-display" id="score-display">
        ⭐ 0
       </div>
      </div>
      <div class="progress-bar">
       <div id="progress-fill" class="progress-fill" style="width: 20%;"></div>
      </div>
     </div><div class="mb-6">
      <p id="question-text" class="question-text"></p>
     </div><div id="answers-container" class="space-y-3"></div><div id="feedback" class="hidden mt-4"></div>
    </div>
   </div><div id="result-screen" class="screen hidden flex-1 flex items-center justify-center p-4">
    <div class="card-container text-center max-w-md w-full result-screen">
     <div id="result-emoji" class="result-emoji">
      ✅
     </div>
     <p id="result-message" class="result-message"></p>
     <p id="result-text" class="result-text"></p>
     <div id="next-button-container" class="mt-6"><button onclick="nextQuestion()" class="btn btn-start w-full">Soal Berikutnya →</button>
     </div>
    </div>
   </div><div id="final-screen" class="screen hidden flex-1 flex items-center justify-center p-4">
    <div class="card-container text-center max-w-md w-full result-screen">
     <div style="font-size: 5rem; margin-bottom: 1rem; animation: bounce 0.6s ease-in-out;">
      🏆
     </div>
     <h2 class="text-2xl font-bold text-yellow-800 mb-2">Alhamdulillah!</h2>
     <p id="final-player-name" class="text-lg text-yellow-700 mb-2">Selamat, Teman!</p>
     <div class="score-display mb-4" id="final-score">
      ⭐ 0
     </div>
     <div id="final-summary" class="text-sm text-yellow-700 mb-6 space-y-2">
      <p>✅ Soal Benar: <span id="correct-count">0</span>/5</p>
      <p>📚 Semoga terus belajar akhlak mulia</p>
     </div><button onclick="resetGame()" class="btn btn-start w-full">Mainkan Lagi 🎮</button>
    </div>
   </div>
  </div>
  <script>
// ============ CONFIG ============
const defaultConfig = {
 game_title: 'Petualangan Akhlak Mulia',
 player_name: '',
 game_subtitle: 'Belajar Akhlak Dengan Menyenangkan'
};

let config = { ...defaultConfig };

function applyConfig(c) {
 const title = c.game_title || defaultConfig.game_title;
 const subtitle = c.game_subtitle || defaultConfig.game_subtitle;
 const el1 = document.getElementById('game-title');
 const el2 = document.getElementById('game-subtitle');
 if (el1) el1.textContent = title;
 if (el2) el2.textContent = subtitle;
}

if (window.elementSdk) {
 window.elementSdk.init({
  defaultConfig,
  onConfigChange: async (c) => { config = c; applyConfig(c); },
  mapToCapabilities: (c) => ({
   recolorables: [],
   borderables: [],
   fontEditable: undefined,
   fontSizeable: undefined
  }),
  mapToEditPanelValues: (c) => new Map([
   ['game_title', c.game_title || defaultConfig.game_title],
   ['player_name', c.player_name || ''],
   ['game_subtitle', c.game_subtitle || defaultConfig.game_subtitle]
  ])
 });
}

applyConfig(config);

// ============ QUESTIONS ============
const questions = [
 {
  q: 'Apa makna dari "Akhlak Mulia"?',
  options: [
   'A. Perilaku yang baik dan terpuji',
   'B. Pakaian yang indah',
   'C. Harta yang banyak',
   'D. Kedudukan yang tinggi'
  ],
  correct: 0
 },
 {
  q: 'Sikap jujur adalah contoh dari akhlak mulia yang berarti...',
  options: [
   'A. Selalu bercerita panjang',
   'B. Berkata sesuai kenyataan tanpa tipu',
   'C. Berbicara dengan keras',
   'D. Mengatakan apa saja yang diinginkan'
  ],
  correct: 1
 },
 {
  q: 'Hormat kepada orang tua adalah akhlak mulia karena...',
  options: [
   'A. Orang tua adalah pemberi hidup',
   'B. Orang tua memberikan uang saku',
   'C. Orang tua membeli mainan',
   'D. Semua jawaban salah'
  ],
  correct: 0
 },
 {
  q: 'Tolong menolong kepada teman yang kesusahan termasuk akhlak...',
  options: [
   'A. Solidaritas sosial',
   'B. Belas kasih',
   'C. Empati dan kepedulian',
   'D. Semua benar'
  ],
  correct: 3
 },
 {
  q: 'Sabar menghadapi kesulitan adalah akhlak mulia karena...',
  options: [
   'A. Membuat orang menertawakan kita',
   'B. Menunjukkan kekuatan hati dan iman',
   'C. Membuat hari lebih panjang',
   'D. Tidak ada gunanya'
  ],
  correct: 1
 }
];

// ============ GAME STATE ============
let playerName = '';
let currentQuestionIdx = 0;
let score = 0;
let correctAnswers = 0;
let answered = false;

function startGame() {
 const input = document.getElementById('player-input');
 playerName = input.value.trim() || 'Teman Baik';
 
 currentQuestionIdx = 0;
 score = 0;
 correctAnswers = 0;
 answered = false;

 document.getElementById('welcome-screen').classList.add('hidden');
 document.getElementById('question-screen').classList.remove('hidden');
 
 showQuestion();
 lucide.createIcons();
}

function showQuestion() {
 answered = false;
 
 const q = questions[currentQuestionIdx];
 const progress = ((currentQuestionIdx + 1) / questions.length) * 100;
 
 document.getElementById('q-counter').textContent = `Soal ${currentQuestionIdx + 1} dari ${questions.length}`;
 document.getElementById('progress-fill').style.width = progress + '%';
 document.getElementById('score-display').textContent = `⭐ ${score}`;
 document.getElementById('question-text').textContent = q.q;
 document.getElementById('feedback').classList.add('hidden');

 const answersContainer = document.getElementById('answers-container');
 answersContainer.innerHTML = '';

 q.options.forEach((option, idx) => {
  const btn = document.createElement('button');
  btn.className = 'btn-answer';
  btn.textContent = option;
  btn.onclick = () => selectAnswer(idx);
  answersContainer.appendChild(btn);
 });
}

function selectAnswer(selectedIdx) {
 if (answered) return;
 answered = true;

 const q = questions[currentQuestionIdx];
 const isCorrect = selectedIdx === q.correct;
 
 const buttons = document.querySelectorAll('.btn-answer');
 buttons.forEach((btn, idx) => {
  btn.disabled = true;
  if (idx === q.correct) {
   btn.classList.add('correct');
  } else if (idx === selectedIdx && !isCorrect) {
   btn.classList.add('wrong');
  }
 });

 const feedback = document.getElementById('feedback');
 feedback.classList.remove('hidden');

 if (isCorrect) {
  score += 20;
  correctAnswers++;
  feedback.className = 'feedback-correct';
  feedback.innerHTML = '✅ Jawaban Benar! +20 Poin';
 } else {
  feedback.className = 'feedback-wrong';
  feedback.innerHTML = '❌ Maaf, jawaban kurang tepat. Coba perhatikan lagi ya!';
 }

 setTimeout(() => {
  showResultScreen(isCorrect);
 }, 1200);
}

function showResultScreen(correct) {
 document.getElementById('question-screen').classList.add('hidden');
 document.getElementById('result-screen').classList.remove('hidden');

 const message = correct ? 'MasyaAllah! Bagus banget!' : 'Tidak apa-apa, coba soal berikutnya!';

 document.getElementById('result-emoji').textContent = correct ? '✅' : '❌';
 document.getElementById('result-message').textContent = message;
 document.getElementById('result-text').textContent = `Poin: ${score}`;
}

function nextQuestion() {
 currentQuestionIdx++;

 if (currentQuestionIdx >= questions.length) {
  showFinalScreen();
 } else {
  document.getElementById('result-screen').classList.add('hidden');
  document.getElementById('question-screen').classList.remove('hidden');
  showQuestion();
 }
}

function showFinalScreen() {
 document.getElementById('result-screen').classList.add('hidden');
 document.getElementById('final-screen').classList.remove('hidden');

 document.getElementById('final-player-name').textContent = `Selamat, ${playerName}!`;
 document.getElementById('final-score').textContent = `⭐ ${score}`;
 document.getElementById('correct-count').textContent = correctAnswers;
}

function resetGame() {
 document.getElementById('final-screen').classList.add('hidden');
 document.getElementById('welcome-screen').classList.remove('hidden');
 document.getElementById('player-input').value = '';
}

lucide.createIcons();
  </script>
 </body>
</html>
